# Site Health: PR Checks
# Canonical version: marvin/content/vault/work/artifacts/site-health-workflows/

name: Site Health (PR)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SITE_URL: "https://fifthset.live"
  BUILD_CMD: "npm run build"
  NODE_VERSION: "20"
  LIGHTHOUSE_URLS: "/,/nyc,/nola"
  FRAMEWORK: "nextjs"

jobs:
  build:
    name: Build & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: ${{ env.BUILD_CMD }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next
          retention-days: 1

  lighthouse:
    name: Lighthouse
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .next

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse
        run: |
          npm start &
          sleep 5

          IFS=',' read -ra URLS <<< "${{ env.LIGHTHOUSE_URLS }}"
          FULL_URLS=""
          for path in "${URLS[@]}"; do
            path=$(echo "$path" | xargs)
            FULL_URLS="$FULL_URLS --collect.url=http://localhost:3000${path}"
          done

          lhci autorun \
            --collect.staticDistDir="" \
            $FULL_URLS \
            --upload.target=temporary-public-storage \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance=off \
            --assert.assertions.categories:accessibility="error; minScore=0.9" \
            --assert.assertions.categories:best-practices="warn; minScore=0.9" \
            --assert.assertions.categories:seo="error; minScore=0.9"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  accessibility:
    name: Accessibility
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .next

      - name: Install pa11y
        run: npm install -g pa11y

      - name: Run accessibility audit
        run: |
          npm start &
          sleep 5

          IFS=',' read -ra URLS <<< "${{ env.LIGHTHOUSE_URLS }}"
          FAILED=0
          for path in "${URLS[@]}"; do
            path=$(echo "$path" | xargs)
            echo "--- Auditing: $path ---"
            pa11y "http://localhost:3000${path}" \
              --standard WCAG2AA \
              --runner axe \
              --threshold 0 || FAILED=1
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::warning::Accessibility issues found. See logs above."
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
