# Site Health: PR Checks
# Canonical version: marvin/content/vault/work/artifacts/site-health-workflows/

name: Site Health (PR)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SITE_URL: "https://fifthset.live"
  NODE_VERSION: "20"

jobs:
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse
        run: |
          npm start &
          sleep 5

          lhci autorun \
            --collect.url=http://localhost:3000/ \
            --collect.url=http://localhost:3000/nyc \
            --collect.url=http://localhost:3000/nola \
            --upload.target=temporary-public-storage \
            --assert.assertions.categories:accessibility="error; minScore=0.9" \
            --assert.assertions.categories:best-practices="warn; minScore=0.9" \
            --assert.assertions.categories:seo="error; minScore=0.9"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  accessibility:
    name: Accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Install pa11y
        run: npm install -g pa11y

      - name: Run accessibility audit
        run: |
          npm start &
          sleep 5

          pa11y "http://localhost:3000/" \
            --standard WCAG2AA \
            --runner axe \
            --threshold 0 || echo "::warning::Accessibility issues found."

          pa11y "http://localhost:3000/nyc" \
            --standard WCAG2AA \
            --runner axe \
            --threshold 0 || echo "::warning::Accessibility issues found."

          pa11y "http://localhost:3000/nola" \
            --standard WCAG2AA \
            --runner axe \
            --threshold 0 || echo "::warning::Accessibility issues found."
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
